{% extends 'base.html' %}
{% block title %}Registration – YSS Anantapur{% endblock %}
{% block content %}
<section class="section">
  <div class="container">
    <div class="form-card">
      <h2 class="form-title">Registration Form</h2>
      <div class="divider-ornament">✦</div>
      <p class="form-subtitle">Please fill in the details carefully to register for the 3-Day Spiritual Program.</p>
      <form method="POST" action="{{ url_for('registration') }}" id="regForm" novalidate>
        <div class="form-grid form-grid-2">
          <div class="form-group">
            <label>Lesson No <span class="req">*</span></label>
            <input type="text" name="lesson_no" class="form-control" placeholder="Enter lesson number e.g. 12345" value="{{ form.get('lesson_no','') }}" required>
          </div>
          <div class="form-group">
            <label>Full Name <span class="req">*</span></label>
            <input type="text" name="full_name" class="form-control" placeholder="Enter your full name" value="{{ form.get('full_name','') }}" required>
          </div>
        </div>
        <div class="form-grid form-grid-3" style="margin-top:1.25rem;">
          <div class="form-group">
            <label>Gender <span class="req">*</span></label>
            <select name="gender" class="form-control" required>
              <option value="">-- Select Gender --</option>
              <option value="Male" {% if form.get('gender')=='Male' %}selected{% endif %}>Male</option>
              <option value="Female" {% if form.get('gender')=='Female' %}selected{% endif %}>Female</option>
              <option value="Other" {% if form.get('gender')=='Other' %}selected{% endif %}>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Age <span class="req">*</span></label>
            <input type="number" name="age" class="form-control" placeholder="Enter your age" value="{{ form.get('age','') }}" min="5" max="120" required>
          </div>
          <div class="form-group">
            <label>Place <span class="req">*</span></label>
            <input type="text" name="place" class="form-control" placeholder="Enter your place" value="{{ form.get('place','') }}" required>
          </div>
        </div>
        <div class="form-grid form-grid-2" style="margin-top:1.25rem;">
          <div class="form-group">
            <label>Kriyaban <span class="req">*</span></label>
            <div class="radio-group">
              <label><input type="radio" name="is_kriyaban" value="yes" {% if form.get('is_kriyaban')=='yes' %}checked{% endif %}> Yes</label>
              <label><input type="radio" name="is_kriyaban" value="no" {% if form.get('is_kriyaban','no')=='no' %}checked{% endif %}> No</label>
            </div>
          </div>
          <div class="form-group">
            <label>WhatsApp No <span class="req">*</span></label>
            <input type="tel" name="whatsapp" class="form-control" placeholder="Enter WhatsApp number" value="{{ form.get('whatsapp','') }}" required>
          </div>
        </div>
        <div class="form-grid form-grid-2" style="margin-top:1.25rem;">
          <div class="form-group">
            <label>Accommodation Required <span class="req">*</span></label>
            <div class="radio-group">
              <label><input type="radio" name="accommodation" value="yes" {% if form.get('accommodation')=='yes' %}checked{% endif %}> Yes</label>
              <label><input type="radio" name="accommodation" value="no" {% if form.get('accommodation','no')=='no' %}checked{% endif %}> No</label>
            </div>
          </div>
          <div class="form-group">
            <label>Volunteer <span class="req">*</span></label>
            <div class="radio-group">
              <label><input type="radio" name="volunteer" value="yes" {% if form.get('volunteer')=='yes' %}checked{% endif %}> Yes</label>
              <label><input type="radio" name="volunteer" value="no" {% if form.get('volunteer','no')=='no' %}checked{% endif %}> No</label>
            </div>
          </div>
        </div>
        <div class="form-grid form-grid-3" style="margin-top:1.25rem;">
          <div class="form-group">
            <label>Date of Arrival <span class="req">*</span></label>
            <input type="date" name="arrival_date" class="form-control" value="{{ form.get('arrival_date','') }}" required>
          </div>
          <div class="form-group">
            <label>Date of Departure <span class="req">*</span></label>
            <input type="date" name="departure_date" class="form-control" value="{{ form.get('departure_date','') }}" required>
          </div>
          <div class="form-group">
            <label>Payment Mode <span class="req">*</span></label>
            <select name="payment_mode" class="form-control" required>
              <option value="">-- Select Payment Mode --</option>
              <option value="UPI" {% if form.get('payment_mode')=='UPI' %}selected{% endif %}>UPI</option>
              <option value="Cash" {% if form.get('payment_mode')=='Cash' %}selected{% endif %}>Cash</option>
              <option value="Bank Transfer" {% if form.get('payment_mode')=='Bank Transfer' %}selected{% endif %}>Bank Transfer</option>
              <option value="Cheque" {% if form.get('payment_mode')=='Cheque' %}selected{% endif %}>Cheque</option>
            </select>
          </div>
        </div>
        <div class="form-note mt-3"><i class="fa fa-info-circle" style="color:var(--accent);"></i> All fields marked with <strong>*</strong> are mandatory.</div>
        <div style="margin-top:2rem;text-align:center;">
          <button type="submit" class="btn btn-primary" style="padding:.9rem 3rem;font-size:1rem;">Submit Registration</button>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
